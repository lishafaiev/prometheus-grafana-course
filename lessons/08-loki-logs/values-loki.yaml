---
# Loki для локального kind-кластера (навчальне ДЗ).
# Відмінності від прикладу з матеріалів курсу (AKS + Azure Blob):
#   - deploymentMode: SingleBinary (усе в одному поді) замість Distributed;
#   - сховище filesystem (PVC через local-path) замість Azure Blob;
#   - вимкнені важкі memcached-кеші (за замовчуванням просять ~9Gi RAM);
#   - auth_enabled: false — без multi-tenant, тож не треба X-Scope-OrgID.
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1          # один інстанс → фактор реплікації 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem   # локальний диск замість azure
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 168h         # 7 днів (для навчання достатньо)
  pattern_ingester:
    enabled: false

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi                      # PVC через local-path-provisioner (є в kind)

# Усі інші режими вимкнені (0 реплік)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Важкі memcached-кеші не влізуть у kind — вимикаємо
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Вбудований minio не потрібен (сховище filesystem)
minio:
  enabled: false

# Loki Canary (синтетичний самотест) — зайвий для ДЗ.
# Разом з ним вимикаємо helm-test (валідація чарту вимагає Canary для тесту).
lokiCanary:
  enabled: false
test:
  enabled: false

# gateway (nginx) лишаємо — єдина точка push/query для Promtail і Grafana
gateway:
  enabled: true
