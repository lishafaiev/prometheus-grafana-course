# Сюди поклади свій prometheus.yml (копія того, який аналізуєш для ДЗ).
# Нижче — типовий приклад для орієнтиру, заміни на свій:

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]
